<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login - Real-Time Currency Converter')}"></head>
<body>
    <div th:replace="~{fragments/layout :: nav}"></div>
    <div class="container">
        <div class="card" style="max-width: 400px; margin: auto;">
            <h2 style="text-align: center;">Login</h2>
            <div th:if="${param.error}" style="color: red; margin-bottom: 1rem; text-align: center;">Invalid username or password.</div>
            <div th:if="${param.logout}" style="color: green; margin-bottom: 1rem; text-align: center;">You have been logged out.</div>
            <div th:if="${param.registered}" style="color: green; margin-bottom: 1rem; text-align: center;">Registration successful! Please login.</div>
            <form th:action="@{/login}" method="post">
                <label>Username</label>
                <input type="text" name="username" required>
                <label>Password</label>
                <input type="password" name="password" required>
                <button type="submit" class="btn" style="width: 100%;">Sign In</button>
            </form>
            <p style="text-align: center; margin-top: 1rem;">Don't have an account? <a href="/register">Register</a></p>
        </div>
    </div>
</body>
</html>
