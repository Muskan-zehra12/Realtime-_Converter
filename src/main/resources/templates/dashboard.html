<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/layout :: head('Market Dashboard')}"></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div th:replace="~{fragments/layout :: nav}"></div>
    <div class="container">
        <!-- Header Section -->
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
            <div>
                <p style="color: var(--primary); font-weight: 700; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;">Overview</p>
                <h1 style="font-size: 2.25rem; font-weight: 800; letter-spacing: -0.03em;">Welcome back, <span th:text="${username}" style="color: var(--primary);"></span></h1>
            </div>
            <div style="text-align: right;">
                <div id="liveClock" style="font-weight: 700; font-size: 1.1rem;"></div>
                <div style="color: var(--text-muted); font-size: 0.875rem; display: flex; align-items: center; gap: 0.4rem; justify-content: flex-end;">
                    <span style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; animation: pulse 2s infinite;"></span>
                    Live Market Data
                </div>
            </div>
        </div>

        <!-- Market Grid -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
            <div th:each="entry : ${rates}" class="card glass-card" style="padding: 1.5rem; margin-bottom: 0; transition: transform 0.2s;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                    <div style="background: #f1f5f9; padding: 0.5rem; border-radius: 8px; font-weight: 800; color: var(--text-main);" th:text="${entry.key}"></div>
                    <div th:class="${entry.value > 1 ? 'trend-up' : 'trend-down'}" style="display: flex; align-items: center; gap: 0.25rem; font-size: 0.875rem; font-weight: 700;">
                        <i th:data-lucide="${entry.value > 1 ? 'trending-up' : 'trending-down'}" style="width: 16px;"></i>
                        <span th:text="${entry.value > 1 ? '+' : ''} + ${#numbers.formatDecimal((entry.value - 1) * 10, 1, 2)} + '%'"></span>
                    </div>
                </div>
                <div style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em;" th:text="${#numbers.formatDecimal(entry.value, 1, 4)}"></div>
                <p style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.5rem;">1 <span th:text="${base}"></span> Equivalent</p>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
            <!-- Chart Section -->
            <div class="card" style="margin-bottom: 0;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h3 style="font-weight: 700; display: flex; align-items: center; gap: 0.5rem;">
                        <i data-lucide="line-chart" style="color: var(--primary);"></i>
                        Market Performance
                    </h3>
                    <select style="width: auto; padding: 0.4rem 1rem; font-size: 0.875rem;">
                        <option>Last 24 Hours</option>
                        <option>Last 7 Days</option>
                    </select>
                </div>
                <div style="height: 350px; position: relative;">
                    <canvas id="marketChart"></canvas>
                </div>
            </div>

            <!-- Quick Actions -->
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="card" style="background: var(--primary); color: white; border: none; margin-bottom: 0;">
                    <h3 style="margin-bottom: 1rem; font-size: 1.25rem;">Quick Convert</h3>
                    <p style="font-size: 0.875rem; opacity: 0.9; margin-bottom: 1.5rem;">Need a fast calculation? Jump to our pro converter.</p>
                    <a href="/converter" class="btn" style="background: white; color: var(--primary); width: 100%;">
                        Open Converter <i data-lucide="external-link" style="width: 16px;"></i>
                    </a>
                </div>
                
                <div class="card" style="margin-bottom: 0;">
                    <h3 style="margin-bottom: 1.5rem; font-size: 1.1rem; font-weight: 700;">Market News</h3>
                    <div style="display: flex; flex-direction: column; gap: 1rem;">
                        <div style="padding-bottom: 1rem; border-bottom: 1px solid var(--border);">
                            <div class="badge" style="background: #ecfdf5; color: #059669; margin-bottom: 0.5rem;">Economy</div>
                            <h4 style="font-size: 0.95rem; font-weight: 600;">Global markets show steady growth in Q1</h4>
                        </div>
                        <div style="padding-bottom: 0.5rem;">
                            <div class="badge" style="background: #fffbeb; color: #d97706; margin-bottom: 0.5rem;">Crypto</div>
                            <h4 style="font-size: 0.95rem; font-weight: 600;">Bitcoin stabilizes above $65k mark</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .trend-up { color: #10b981; }
        .trend-down { color: #ef4444; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>

    <script th:inline="javascript">
        // Live Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Chart.js
        const rates = /*[[${rates}]]*/ {};
        const ctx = document.getElementById('marketChart').getContext('2d');
        
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(79, 70, 229, 0.2)');
        gradient.addColorStop(1, 'rgba(79, 70, 229, 0)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: Object.keys(rates),
                datasets: [{
                    label: 'Exchange Rate',
                    data: Object.values(rates),
                    borderColor: '#4f46e5',
                    borderWidth: 3,
                    backgroundColor: gradient,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 6,
                    pointHoverBackgroundColor: '#4f46e5',
                    pointHoverBorderColor: 'white',
                    pointHoverBorderWidth: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        padding: 12,
                        backgroundColor: '#1e293b',
                        titleFont: { size: 14, weight: 'bold' },
                        bodyFont: { size: 13 }
                    }
                },
                scales: {
                    y: {
                        grid: { color: 'rgba(0,0,0,0.05)', drawBorder: false },
                        ticks: { font: { family: 'Inter' } }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { font: { family: 'Inter' } }
                    }
                }
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
