<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Real-Time Converter</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #64748b;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Modern Navbar */
        nav {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav .logo-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.025em;
        }

        nav .links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        nav .links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.925rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        nav .links a:hover {
            color: var(--primary);
        }

        nav .links a.active {
            color: var(--primary);
        }

        /* Container & Cards */
        .container {
            max-width: 1100px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Inputs & Buttons */
        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #fff;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background-color: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: #f1f5f9;
            border-color: var(--secondary);
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            nav .links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo-container">
            <i data-lucide="refresh-cw"></i>
            <span>Real-Time Converter</span>
        </a>
        <div class="links">
            <span sec:authorize="isAuthenticated()" style="display: flex; gap: 1.5rem;">
                <a href="/dashboard"><i data-lucide="layout-dashboard" style="width:18px"></i> Dashboard</a>
                <a href="/converter"><i data-lucide="coins" style="width:18px"></i> Currencies</a>
                <a href="/crypto-converter"><i data-lucide="bitcoin" style="width:18px"></i> Crypto</a>
                <a href="/unit-converter"><i data-lucide="ruler" style="width:18px"></i> Units</a>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <button type="submit" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-weight:500;font-size:0.925rem;display:flex;align-items:center;gap:0.4rem;font-family:inherit;">
                        <i data-lucide="log-out" style="width:18px"></i> Logout
                    </button>
                </form>
            </span>
            <span sec:authorize="isAnonymous()" style="display: flex; gap: 1rem;">
                <a href="/login" class="btn btn-outline">Login</a>
                <a href="/register" class="btn">Get Started</a>
            </span>
        </div>
    </nav>
    <div class="container">
        <div th:replace="${content}"></div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
